<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        padding: 16px;
        width: 280px;
        margin: 0;
        background-color: #f8f9fa;
      }

      .container {
        background: white;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin: 0 0 16px 0;
        font-size: 18px;
        color: #333;
        text-align: center;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #555;
        font-size: 14px;
      }

      select,
      input,
      button {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }

      select:focus,
      input:focus,
      button:focus {
        outline: none;
        border-color: #4285f4;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
      }

      button {
        background-color: #4285f4;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover:not(:disabled) {
        background-color: #3367d6;
      }

      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .secondary-button {
        background-color: #f1f3f4;
        color: #333;
      }

      .secondary-button:hover:not(:disabled) {
        background-color: #e8eaed;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-group input[type="checkbox"] {
        width: auto;
        margin: 0;
      }

      .checkbox-group label {
        margin: 0;
        font-weight: normal;
        cursor: pointer;
      }

      #statusMessage {
        min-height: 20px;
        font-weight: 500;
        margin-top: 12px;
        padding: 8px;
        border-radius: 4px;
        font-size: 13px;
        text-align: center;
        transition: all 0.2s;
      }

      #statusMessage.success {
        background-color: #e8f5e8;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
      }

      #statusMessage.error {
        background-color: #ffeaea;
        color: #c62828;
        border: 1px solid #ffcdd2;
      }

      #statusMessage.processing {
        background-color: #e3f2fd;
        color: #1976d2;
        border: 1px solid #bbdefb;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .input-group input {
        flex: 1;
      }

      .input-group span {
        font-size: 13px;
        color: #666;
      }

      .divider {
        height: 1px;
        background-color: #e0e0e0;
        margin: 16px 0;
      }

      .version {
        font-size: 11px;
        color: #999;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Currency Translator</h1>

      <div class="form-group">
        <label for="currency">Preferred Currency:</label>
        <select id="currency">
          <option value="EUR">EUR (€)</option>
          <option value="USD">USD ($)</option>
          <option value="GBP">GBP (£)</option>
          <option value="JPY">JPY (¥)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="language">Translation Language:</label>
        <select id="language">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese</option>
        </select>
      </div>

      <div class="form-group">
        <label for="msgTimeout">Message display time:</label>
        <div class="input-group">
          <input id="msgTimeout" type="number" min="1" max="10" value="3" />
          <span>seconds</span>
        </div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input id="autoProcess" type="checkbox" checked />
          <label for="autoProcess">Auto-process new content</label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="button-group">
        <button id="reprocess">Reprocess Page</button>
        <button id="clearCache" class="secondary-button">Clear Cache</button>
      </div>

      <div id="statusMessage"></div>

      <div class="version">v1.0</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
