<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #edf3ef;
        --surface: #ffffff;
        --surface-alt: #f6f8f5;
        --ink: #18333c;
        --muted: #5c7278;
        --border: #d5e0da;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --accent-soft: #daf0eb;
        --success: #18794e;
        --success-soft: #e8f6ee;
        --processing: #0b63b6;
        --processing-soft: #e7f0fb;
        --danger: #b42318;
        --danger-soft: #fde8e6;
        --shadow: 0 18px 40px rgba(24, 51, 60, 0.12);
      }

      body {
        font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
        padding: 14px;
        margin: 0;
        width: 340px;
        background:
          radial-gradient(circle at top left, #f7fbf9 0, #edf3ef 46%, #e6eeea 100%);
        color: var(--ink);
        box-sizing: border-box;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      .panel {
        background: var(--surface);
        border: 1px solid rgba(213, 224, 218, 0.9);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .header {
        position: relative;
        padding: 18px 18px 16px;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.96), rgba(17, 94, 89, 0.9)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent);
        color: #f7fbfa;
      }

      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .hint-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
      }

      .hint-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 1px solid rgba(247, 251, 250, 0.32);
        background: rgba(247, 251, 250, 0.12);
        color: #f7fbfa;
        font-size: 13px;
        font-weight: 700;
        cursor: help;
        flex-shrink: 0;
        padding: 0;
      }

      .hint-badge:focus-visible {
        outline: 2px solid rgba(247, 251, 250, 0.9);
        outline-offset: 2px;
      }

      .tooltip-bubble {
        position: absolute;
        top: calc(100% + 12px);
        right: -4px;
        width: 220px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(11, 27, 32, 0.96);
        color: #f7fbfa;
        font-size: 12px;
        line-height: 1.4;
        text-align: left;
        box-shadow: 0 18px 32px rgba(11, 27, 32, 0.24);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-4px);
        transition: opacity 0.18s ease, transform 0.18s ease,
          visibility 0.18s ease;
        pointer-events: none;
        z-index: 2;
      }

      .tooltip-bubble::before {
        content: "";
        position: absolute;
        top: -6px;
        right: 14px;
        width: 12px;
        height: 12px;
        background: rgba(11, 27, 32, 0.96);
        transform: rotate(45deg);
        border-radius: 2px;
      }

      .hint-wrap:hover .tooltip-bubble,
      .hint-wrap:focus-within .tooltip-bubble {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .container {
        padding: 18px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: var(--ink);
        font-size: 13px;
      }

      select,
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        background: var(--surface);
        color: var(--ink);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      button {
        width: 100%;
        padding: 12px;
        border: 1px solid transparent;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease,
          background-color 0.18s ease, border-color 0.18s ease;
      }

      .primary-button {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-strong) 100%
        );
        color: white;
        box-shadow: 0 10px 20px rgba(15, 118, 110, 0.18);
      }

      .primary-button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(15, 118, 110, 0.24);
      }

      .secondary-button {
        background: var(--surface-alt);
        color: var(--ink);
        border-color: var(--border);
      }

      .secondary-button:hover:not(:disabled) {
        background: #edf3ef;
      }

      .tertiary-button {
        width: auto;
        padding: 8px 12px;
        font-size: 12px;
        background: transparent;
        border-color: var(--border);
        color: var(--muted);
      }

      .tertiary-button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        background: var(--surface-alt);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 8px;
      }

      .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin: 0;
        accent-color: var(--accent);
      }

      .checkbox-group label {
        margin: 0;
        font-weight: normal;
        cursor: pointer;
        flex: 1;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .input-group input {
        flex: 1;
      }

      .input-group span {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }

      .status-message {
        min-height: 20px;
        padding: 10px;
        border: 1px solid transparent;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
        margin-top: 16px;
        transition: all 0.3s ease;
        font-weight: 500;
        background: var(--surface-alt);
        color: var(--muted);
      }

      .status-message:empty {
        padding: 0;
        min-height: 0;
        margin-top: 0;
        border-width: 0;
      }

      .status-message.success {
        background: var(--success-soft);
        border-color: rgba(24, 121, 78, 0.16);
        color: var(--success);
      }

      .status-message.error {
        background: var(--danger-soft);
        border-color: rgba(180, 35, 24, 0.16);
        color: var(--danger);
      }

      .status-message.processing {
        background: var(--processing-soft);
        border-color: rgba(11, 99, 182, 0.16);
        color: var(--processing);
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
        margin: 20px 0;
      }

      .stats {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
      }

      .stats[hidden] {
        display: none;
      }

      .stat-box {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 14px;
        background: linear-gradient(
          135deg,
          rgba(15, 118, 110, 0.08),
          rgba(15, 118, 110, 0.02)
        );
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(15, 118, 110, 0.12);
      }

      .stat-number {
        font-size: 24px;
        font-weight: 600;
        color: var(--accent-strong);
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .stat-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .stat-note {
        font-size: 12px;
        color: var(--muted);
      }

      .version {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 12px;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="header-row">
          <h1>Currency Converter</h1>
          <div class="hint-wrap">
            <button
              class="hint-badge"
              id="helpTooltipButton"
              type="button"
              aria-label="Show extension summary"
              aria-describedby="helpTooltipBubble"
            >
              ?
            </button>
            <div class="tooltip-bubble" id="helpTooltipBubble" role="tooltip">
              Convert detected prices inline with bounded cache and safe fallbacks.
            </div>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="form-group">
          <label for="currency">Preferred Currency</label>
          <select id="currency">
            <option value="EUR">EUR (€) - Euro</option>
            <option value="USD">USD ($) - US Dollar</option>
            <option value="GBP">GBP (£) - British Pound</option>
            <option value="JPY">JPY (¥) - Japanese Yen</option>
            <option value="CNY">CNY (¥) - Chinese Yuan</option>
            <option value="KRW">KRW (₩) - Korean Won</option>
          </select>
        </div>

        <div class="form-group">
          <label for="msgTimeout">Status Message Duration</label>
          <div class="input-group">
            <input id="msgTimeout" type="number" min="1" max="10" value="3" />
            <span>seconds</span>
          </div>
        </div>

        <div class="checkbox-group">
          <input id="compactMode" type="checkbox" />
          <label for="compactMode">Use compact inline conversion text</label>
        </div>

        <div class="checkbox-group">
          <input id="autoProcess" type="checkbox" checked />
          <label for="autoProcess">Process supported pages automatically</label>
        </div>

        <div class="checkbox-group">
          <input id="showStats" type="checkbox" />
          <label for="showStats">Show local conversion statistics</label>
        </div>

        <div class="divider"></div>

        <div class="stats" id="statsSection" hidden>
          <div class="stat-box">
            <div class="stat-copy">
              <div class="stat-label">Conversions</div>
              <div class="stat-number" id="conversionsCount">0</div>
              <div class="stat-note">Stored locally in chrome.storage.sync</div>
            </div>
            <button id="resetStats" class="tertiary-button" type="button">
              Reset Stats
            </button>
          </div>
        </div>

        <div class="button-grid">
          <button id="reprocess" class="primary-button" type="button">
            <span id="reprocessText">Process</span>
          </button>
          <button id="clearCache" class="secondary-button" type="button">
            Clear Cache
          </button>
        </div>

        <div
          id="statusMessage"
          class="status-message"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <div class="version" id="versionText">v1.0.0</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
